# Render Blueprint: deploy backend (Web Service) + frontend (Static Site).
# Set CORS_ORIGINS on the backend to your static site URL after first deploy.

services:
  - type: web
    name: scenariosim-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: BYTEPLUS_API_KEY
        sync: false
      - key: BYTEPLUS_BASE_URL
        value: https://ark.ap-southeast.bytepluses.com/api/v3
      - key: DEMO_MODE
        value: "false"
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: scenariosim-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
